<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-forest-dark text-gray-200 min-h-screen flex flex-col">
    <header class="bg-forest-darker border-b border-forest-green/20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">🌲</span>
                    <a href="/" class="text-xl font-bold">
                        <span class="text-forest-green">Nims</span><span class="text-solar-gold">Forest</span>
                    </a>
                </div>
                <nav class="flex items-center gap-6 text-sm">
                    <a href="/" class="text-gray-400 hover:text-forest-green transition-colors">Overview</a>
                    <a href="/lands" class="text-gray-400 hover:text-forest-green transition-colors">Lands</a>
                    <a href="/containers" class="text-gray-400 hover:text-forest-green transition-colors">Containers</a>
                    <a href="/trees" class="text-gray-400 hover:text-forest-green transition-colors">Trees</a>
                    <a href="/treehouses" class="text-gray-400 hover:text-solar-gold transition-colors">Treehouses</a>
                    <a href="/nims" class="text-gray-400 hover:text-life-blue transition-colors">Nims</a>
                    <a href="/songbirds" class="text-gray-400 hover:text-purple-400 transition-colors">Songbirds</a>
                    <a href="/sources" class="text-gray-400 hover:text-emerald-400 transition-colors">Sources</a>
                    <a href="/infrastructure" class="text-gray-400 hover:text-cyan-400 transition-colors">Infrastructure</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        {{template "content" .}}
    </main>

    <footer class="border-t border-forest-green/10 py-4">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-xs text-gray-600">
            NimsForest Dashboard &middot; Live updates via HTMX
        </div>
    </footer>
    <script src="/static/htmx.min.js"></script>
    <script>
    function applyFilter() {
        var input = document.getElementById('filter-input');
        if (!input) return;
        var term = input.value.toLowerCase();
        document.querySelectorAll('[data-filterable]').forEach(function(el) {
            var name = (el.getAttribute('data-name') || '').toLowerCase();
            el.style.display = name.indexOf(term) !== -1 ? '' : 'none';
        });
    }
    document.addEventListener('input', function(e) {
        if (e.target.id === 'filter-input') applyFilter();
    });
    document.addEventListener('htmx:afterSwap', applyFilter);
    </script>
</body>
</html>
