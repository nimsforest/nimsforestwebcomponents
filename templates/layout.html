<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-forest-bg text-soil min-h-screen flex flex-col">
    <header class="bg-white border-b border-sprout/40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">{{.App.Emoji}}</span>
                    <a href="/" class="text-xl font-bold">
                        <span class="text-canopy">Nims</span><span class="text-solar-gold">{{.App.Name}}</span>
                    </a>
                </div>
                {{if .App.NavItems}}
                <nav class="flex items-center gap-6 text-sm">
                    {{range .App.NavItems}}
                    <a href="{{.Href}}" class="text-soil hover:text-forest-green transition-colors">{{.Label}}</a>
                    {{end}}
                </nav>
                {{end}}
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        {{template "content" .}}
    </main>

    <footer class="border-t border-sprout/30 py-4">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-xs text-soil/60">
            {{.App.Footer}}
        </div>
    </footer>
    <script src="/static/htmx.min.js"></script>
    <script>
    function applyFilter() {
        var input = document.getElementById('filter-input');
        if (!input) return;
        var term = input.value.toLowerCase();
        document.querySelectorAll('[data-filterable]').forEach(function(el) {
            var name = (el.getAttribute('data-name') || '').toLowerCase();
            el.style.display = name.indexOf(term) !== -1 ? '' : 'none';
        });
    }
    document.addEventListener('input', function(e) {
        if (e.target.id === 'filter-input') applyFilter();
    });
    document.addEventListener('htmx:afterSwap', applyFilter);
    </script>
    {{if .App.ChatWidget}}
    <script>
    window.nimschatwidgetConfig = Object.assign(window.nimschatwidgetConfig || {}, {
        baseURL: "{{.App.ChatWidget.BaseURL}}",
        webchatURL: "{{.App.ChatWidget.WebchatURL}}"{{if .App.ChatWidget.DefaultNim}},
        defaultNim: "{{.App.ChatWidget.DefaultNim}}"{{end}}
    });
    </script>
    <script src="{{.App.ChatWidget.BaseURL}}/widget"></script>
    {{end}}
</body>
</html>
